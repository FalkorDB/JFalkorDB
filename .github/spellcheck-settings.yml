matrix:
- name: Markdown
  expect_match: false
  apsell:
    lang: en
    d: en_US
  dictionary:
    wordlists:
    - .github/wordlist.txt
    output: wordlist.dic
  pipeline:
  - pyspelling.filters.markdown:
      markdown_extensions:
      - markdown.extensions.extra:
  - pyspelling.filters.html:
      comments: false
      attributes:
      - alt
      ignores:
      - ':matches(code, pre)'
      - code
      - pre
      - blockquote
      - img
      - table
  sources:
  # CHANGELOG.md is auto-generated by release-please from commit subjects + SHAs (e.g. `fdc`, `dae`)
  # and code identifiers (e.g. `hashCode`, `equalsverifier`), which are not meaningfully spellcheckable
  # and would block every release PR. Exclude it; README and the other prose Markdown are still checked.
  - '*.md|!CHANGELOG.md'
  - 'docs/*.md'
