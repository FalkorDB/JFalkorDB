name: Publish Snapshot
on:
  push:
    branches:
      - master
      - '[0-9].x'
  workflow_dispatch:

jobs:
  # Guard: only publish when the POM is a -SNAPSHOT. A release-version commit on a deploy branch
  # (e.g. the release-please PR that bumps the POM to the release version) must NOT trigger an
  # unsigned/duplicate snapshot deploy — this job gates the deploy below on `is_snapshot`.
  check-version:
    name: Check version is -SNAPSHOT
    runs-on: ubuntu-latest
    outputs:
      is_snapshot: ${{ steps.check.outputs.is_snapshot }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
      - name: Read project.version and check for -SNAPSHOT
        id: check
        run: |
          version="$(just project-version)"
          echo "project.version = $version"
          if [[ "$version" == *-SNAPSHOT ]]; then
            echo "is_snapshot=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_snapshot=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping snapshot deploy: project.version '$version' is not a -SNAPSHOT."
          fi

  snapshot:
    name: Deploy Snapshot
    needs: check-version
    if: needs.check-version.outputs.is_snapshot == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Set up publishing to maven central
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_TOKEN
          # gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }} # Value of the GPG private key to import
          # gpg-passphrase: MAVEN_GPG_PASSPHRASE # env variable for GPG private ke

      - name: Cache dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.m2/repository
            /var/cache/apt
          key: jfalkordb-${{hashFiles('**/pom.xml')}}

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Fetch dependencies (via just)
        run: just fetch-deps

      - name: Deploy snapshot (via just)
        run: just deploy-snapshot
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_TOKEN: ${{ secrets.CENTRAL_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.OSSH_GPG_SECRET_KEY_PASSWORD }}

          # MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

